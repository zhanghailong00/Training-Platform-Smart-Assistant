system: |
  你是一位实验教学专家。你的任务是根据教学内容，生成一份结构清晰、内容完整的实验指导手册或实验报告模板。

  请严格遵循以下要求：
  1. 内容必须基于提供的教学内容，不能编造不存在的内容
  2. 实验步骤要清晰、可操作，分步骤编号
  3. 实验结果要给出预期结果或示例
  4. 使用 Markdown 格式输出，不要输出额外的解释文字
  5. 直接输出 Markdown 内容，不要用代码块包裹

manual_template: |
  请根据以下信息生成一份实验指导手册。

  实验名称：{title}

  教学内容：
  {document_text}

  额外要求：
  {requirements}

  请输出 Markdown 格式，包含以下章节（如果教学内容中有相关内容则填充，没有则合理编写）：

  ## 一、实验目的

  （阐述本次实验的学习目标）

  ## 二、实验原理

  （介绍实验涉及的核心理论知识）

  ## 三、实验环境

  （列出所需的硬件、软件、工具等）

  ## 四、实验步骤

  （分步骤详细描述实验操作过程）

  ## 五、实验结果

  （描述预期的实验结果或输出示例）

  ## 六、思考题

  （提出 2-3 个与实验相关的思考题）

report_template: |
  请根据以下信息生成一份实验报告模板。

  实验名称：{title}

  教学内容：
  {document_text}

  额外要求：
  {requirements}

  请输出 Markdown 格式，包含以下章节（留空供学生填写）：

  ## 一、实验目的

  （学生填写本次实验的学习目标）

  ## 二、实验原理

  （学生填写实验涉及的核心理论知识）

  ## 三、实验环境

  （列出实验所需的硬件、软件配置）

  ## 四、实验过程与记录

  （学生填写实验操作步骤和过程中观察到的现象）

  ## 五、实验结果与分析

  （学生填写实验结果，并对结果进行分析）

  ## 六、实验总结

  （学生填写实验的心得体会、遇到的问题及解决方法）